<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraped Products - Web Scraper Display</title>
    <link rel="stylesheet" href="products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-container">
            <div class="header-content">
                <h1><i class="fas fa-globe"></i> Product Showcase</h1>
                <p>Scraped Product Data Visualization</p>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">
        <!-- Metadata Section -->
        <section class="metadata-section" id="metadata">
            <div class="metadata-box">
                <span id="totalProducts">Total Products: <strong>0</strong></span>
                <span id="scrapedAt">Scraped: <strong>--</strong></span>
                <span id="scrapeTool">Tool: <strong>--</strong></span>
            </div>
        </section>

        <!-- Products Grid -->
        <section class="products-section">
            <h2>Featured Products</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here by JavaScript -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading products...</p>
                </div>
            </div>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-controls">
                <input type="text" id="searchInput" placeholder="Search products..." class="search-box">
                <select id="sortSelect" class="sort-dropdown">
                    <option value="default">Sort by: Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Rating: Highest First</option>
                </select>
            </div>
        </section>

        <!-- Statistics Section -->
        <section class="stats-section" id="statsSection" style="display: none;">
            <h3>Product Statistics</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Average Price</h4>
                    <p class="stat-value" id="avgPrice">$0.00</p>
                </div>
                <div class="stat-card">
                    <h4>Average Rating</h4>
                    <p class="stat-value" id="avgRating">0.0/5</p>
                </div>
                <div class="stat-card">
                    <h4>Highest Rated</h4>
                    <p class="stat-value" id="highestRated">--</p>
                </div>
                <div class="stat-card">
                    <h4>Cheapest Item</h4>
                    <p class="stat-value" id="cheapestItem">$0.00</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Web Scraper Project | <span id="itemCount">0</span> products displayed</p>
    </footer>

    <script src="products.js"></script>
</body>
</html>
